# Blueprint Render — SOS Nounous & Services
# Déploie : un service web (image Docker) + une base PostgreSQL managée + un disque
# persistant pour les pièces justificatives chiffrées.
#
# Utilisation : pousser le dépôt sur GitHub/GitLab, puis dans Render →
# "New +" → "Blueprint" → sélectionner le dépôt. Render lit ce fichier.
#
# Plans : ajuster selon votre offre Render (free pour tester ; payant pour la prod).

databases:
  - name: sosnounous-db
    databaseName: sosnounous
    user: sosnounous
    plan: free # ⚠️ base de test (expire) ; passer à un plan payant pour la production

services:
  - type: web
    name: sosnounous
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /api/health
    disk:
      name: uploads
      mountPath: /data/uploads
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: sosnounous-db
          property: connectionString
      - key: FILE_ENCRYPTION_KEY
        generateValue: true # secret généré par Render (accepté par lib/storage)
      - key: FILE_STORAGE_DIR
        value: /data/uploads
      - key: NEXT_PUBLIC_SITE_URL
        sync: false # à renseigner : URL Render (https://sosnounous.onrender.com) ou domaine
      - key: NOTIFICATIONS_MODE
        value: mock # passer à "live" + ajouter EMAIL_API_KEY / SMS_API_KEY quand prêts
